services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: erp_root_password
      MARIADB_DATABASE: erp_industrial
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - erp-network

volumes:
  db_data:

networks:
  erp-network:
    name: erp-network
    driver: bridge
